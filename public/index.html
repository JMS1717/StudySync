<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySync - Task Manager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📚 StudySync</h1>
      <p class="subtitle">Stay organized. Stay ahead.</p>
    </header>

    <nav class="nav-tabs">
      <button class="nav-btn active" data-tab="dashboard">Dashboard</button>
      <button class="nav-btn" data-tab="assignments">All Tasks</button>
      <button class="nav-btn" data-tab="prioritized">Prioritized</button>
      <button class="nav-btn" data-tab="create">Create Task</button>
      <button class="nav-btn" data-tab="calendar">Calendar</button>
    </nav>

    <!-- Dashboard Tab -->
    <section id="dashboard" class="tab-content active">
      <div class="dashboard-grid">
        <div class="card">
          <h3>📊 Stats</h3>
          <div class="stat">
            <span class="stat-label">Total Tasks:</span>
            <span class="stat-value" id="stat-total">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Completed:</span>
            <span class="stat-value" id="stat-completed">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Due Soon:</span>
            <span class="stat-value urgent" id="stat-due-soon">0</span>
          </div>
        </div>

        <div class="card">
          <h3>🔔 Notifications</h3>
          <div id="notifications-widget"></div>
        </div>

        <div class="card">
          <h3>⚡ Top Priority</h3>
          <div id="top-priority"></div>
        </div>
      </div>
    </section>

    <!-- All Assignments Tab -->
    <section id="assignments" class="tab-content">
      <h2>All Tasks</h2>
      <div id="assignments-list" class="assignments-list"></div>
    </section>

    <!-- Prioritized Tab -->
    <section id="prioritized" class="tab-content">
      <h2>Prioritized Task List</h2>
      <div id="prioritized-list" class="assignments-list"></div>
    </section>

    <!-- Create Task Tab -->
    <section id="create" class="tab-content">
      <h2>Create New Task</h2>
      <form id="create-form" class="form">
        <div class="form-group">
          <label>Task Title *</label>
          <input type="text" id="form-title" required placeholder="e.g., ETI 421 Project">
        </div>
        <div class="form-group">
          <label>Course Code *</label>
          <input type="text" id="form-course" required placeholder="e.g., ETI 421">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Due Date *</label>
            <input type="datetime-local" id="form-due-date" required>
          </div>
          <div class="form-group">
            <label>Priority</label>
            <select id="form-priority">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Estimated Hours</label>
            <input type="number" id="form-hours" min="1" max="24" value="5">
          </div>
        </div>
        <div class="form-group">
          <label>Instructions</label>
          <textarea id="form-instructions" placeholder="Any additional details..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Create Task</button>
        <button type="button" class="btn btn-secondary" id="load-demo">Load Demo Data</button>
      </form>
    </section>

    <!-- Calendar Tab -->
    <section id="calendar" class="tab-content">
      <h2>Calendar Events</h2>
      
      <div style="margin-bottom: 30px;">
        <h3>Add Event</h3>
        <form id="create-event-form" class="form">
          <div class="form-group">
            <label>Event Title *</label>
            <input type="text" id="form-event-title" required placeholder="e.g., Linear Algebra Lecture">
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Start Time *</label>
              <input type="datetime-local" id="form-event-start" required>
            </div>
            <div class="form-group">
              <label>End Time</label>
              <input type="datetime-local" id="form-event-end">
            </div>
          </div>
          <div class="form-group">
            <label>Event Type</label>
            <select id="form-event-type">
              <option value="lecture">Lecture</option>
              <option value="lab">Lab</option>
              <option value="meeting">Meeting</option>
              <option value="other">Other</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Add Event</button>
        </form>
      </div>

      <h3>Upcoming Events</h3>
      <div id="calendar-list" class="events-list"></div>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
